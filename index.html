<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sigmowy Decyzator 3067</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --bg: #06060e; --surface: rgba(255, 255, 255, 0.04); --surface2: rgba(255, 255, 255, 0.08);
            --blue: #4DFFFF; --purple: #B47FFF; --green: #39FF96; --red: #FF5555;
            --text: #F0F0FF; --text-dim: rgba(240, 240, 255, 0.25); --border: rgba(255, 255, 255, 0.1); --ff: 'Space Grotesk', sans-serif;
        }
        body { background-color: var(--bg); color: var(--text); font-family: var(--ff); min-height: 100vh; display: flex; justify-content: center; overflow-x: hidden; }
        .app { width: 100%; max-width: 450px; padding: 2rem 1.5rem; display: flex; flex-direction: column; gap: 1.5rem; }
        .header { display: flex; align-items: center; justify-content: space-between; }
        .wordmark { font-weight: 700; letter-spacing: 2px; font-size: 14px; color: var(--text-dim); text-transform: uppercase; }
        .wordmark span { color: var(--blue); }
        .key-badge { font-size: 10px; text-transform: uppercase; padding: 5px 10px; border-radius: 50px; border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; background: transparent; font-family: var(--ff); transition: all 0.2s; }
        .key-badge.set { border-color: var(--green); color: var(--green); }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(6, 6, 14, 0.95); z-index: 100; align-items: center; justify-content: center; padding: 1.5rem; }
        .modal-overlay.visible { display: flex; }
        .modal { background: #0f0f1f; border: 1px solid var(--border); border-radius: 20px; padding: 2rem; width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 1rem; }
        .modal h3 { font-size: 16px; }
        .modal p { font-size: 12px; color: var(--text-dim); }
        .modal a { color: var(--blue); }
        .key-input { background: var(--surface); border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: var(--text); outline: none; width: 100%; font-family: var(--ff); font-size: 14px; }
        .key-input:focus { border-color: rgba(77,255,255,0.4); }

        /* Toggle trybów */
        .mode-toggle { display: flex; gap: 8px; }
        .mode-btn { flex: 1; padding: 12px; border-radius: 50px; border: 1px solid var(--border); background: transparent; color: var(--text-dim); font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--ff); transition: all 0.2s; }
        .mode-btn.active { background: linear-gradient(90deg, #1a8cff, #7c3fff); color: white; border: none; }

        .hero-input { width: 100%; background: transparent; border: none; outline: none; color: var(--text); font-size: 24px; font-weight: 700; border-bottom: 2px solid rgba(77, 255, 255, 0.2); padding-bottom: 10px; resize: none; font-family: var(--ff); }
        .opt-row { background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; animation: slideIn 0.25s ease; }
        .opt-row.winner { border-color: var(--green); background: rgba(57,255,150,0.1); }

        .cta-btn { width: 100%; padding: 18px; border-radius: 50px; border: none; background: linear-gradient(90deg, #1a8cff, #7c3fff); color: white; font-weight: 700; cursor: pointer; margin-top: auto; font-family: var(--ff); font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
        .cta-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .result-area { background: var(--surface2); border-radius: 20px; padding: 20px; text-align: center; min-height: 100px; display: flex; flex-direction: column; justify-content: center; }
        .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 8px; }

        /* Spinner w przycisku */
        .btn-inner { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
        .loading .spinner { display: block; }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .del-btn { background: none; border: none; color: var(--red); cursor: pointer; font-size: 16px; padding: 0 4px; }
        .add-row { display: flex; gap: 10px; margin-top: 10px; }
        .add-btn { width: 50px; border-radius: 12px; border: none; background: var(--blue); font-weight: bold; font-size: 20px; cursor: pointer; color: black; }
    </style>
</head>
<body>

    <!-- Modal z kluczem Groq -->
    <div class="modal-overlay" id="keyModal">
        <div class="modal">
            <h3>Klucz API — Groq</h3>
            <p>Pobierz darmowy klucz na <a href="https://console.groq.com" target="_blank">console.groq.com</a> → API Keys</p>
            <input type="password" class="key-input" id="keyInput" placeholder="gsk_...">
            <button class="cta-btn" onclick="saveKey()">Zapisz</button>
            <button onclick="closeModal()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:12px;text-align:center">Anuluj</button>
        </div>
    </div>

    <div class="app">
        <header class="header">
            <div class="wordmark">sigmowy decyzator<span>.</span></div>
            <button class="key-badge" id="keyBadge" onclick="openModal()">klucz api</button>
        </header>

        <!-- Tryb: opcje ręczne vs AI -->
        <div class="mode-toggle">
            <button class="mode-btn active" id="modeList" onclick="setMode('list')">opcje</button>
            <button class="mode-btn" id="modeAi" onclick="setMode('ai')">fredek</button>
        </div>

        <textarea class="hero-input" id="qInput" placeholder="pytanko masz jakies?" rows="2"></textarea>

        <!-- Sekcja ręcznych opcji -->
        <div id="listSection">
            <div class="label">opcje <span id="counter" style="color:var(--blue)">0/10</span></div>
            <div id="list"></div>
            <div class="add-row">
                <input type="text" id="addInput" class="key-input" style="flex:1" placeholder="Dodaj opcję...">
                <button class="add-btn" onclick="addItem()">+</button>
            </div>
        </div>

        <button class="cta-btn" id="goBtn" onclick="runDecide()" disabled>
            <div class="btn-inner">
                <div class="spinner" id="spinner"></div>
                <span id="btnLabel">Ugotuj</span>
            </div>
        </button>

        <div class="result-area" id="resCard">
            <div id="resInner"><div class="label">wyniczek</div></div>
        </div>
    </div>

<script>
    let items = [];
    let mode = 'list';
    const STORAGE_KEY = 'groq_api_key';

    // --- Klucz ---
    function getKey() { return localStorage.getItem(STORAGE_KEY); }
    function saveKey() {
        const val = document.getElementById('keyInput').value.trim();
        if (val) { localStorage.setItem(STORAGE_KEY, val); closeModal(); updateKeyBadge(); }
    }
    function openModal() {
        const k = getKey();
        if (k) document.getElementById('keyInput').value = k;
        document.getElementById('keyModal').classList.add('visible');
    }
    function closeModal() { document.getElementById('keyModal').classList.remove('visible'); }
    function updateKeyBadge() {
        const badge = document.getElementById('keyBadge');
        badge.textContent = getKey() ? 'Klucz ✓' : 'klucz api';
        badge.classList.toggle('set', !!getKey());
        checkBtn();
    }

    // --- Tryb ---
    function setMode(m) {
        mode = m;
        document.getElementById('modeList').classList.toggle('active', m === 'list');
        document.getElementById('modeAi').classList.toggle('active', m === 'ai');
        document.getElementById('listSection').style.display = m === 'list' ? 'block' : 'none';
        checkBtn();
    }

    // --- Lista opcji ---
    function addItem() {
        const input = document.getElementById('addInput');
        const val = input.value.trim();
        if (val && items.length < 10) {
            items.push(val);
            input.value = '';
            renderList();
        }
    }
    function renderList() {
        document.getElementById('list').innerHTML = items.map((it, i) => `
            <div class="opt-row" id="row-${i}">
                <span>${it}</span>
                <button class="del-btn" onclick="items.splice(${i},1);renderList()">✕</button>
            </div>
        `).join('');
        document.getElementById('counter').textContent = `${items.length}/10`;
        checkBtn();
    }

    function checkBtn() {
        const hasQ = document.getElementById('qInput').value.trim().length > 2;
        if (mode === 'list') {
            document.getElementById('goBtn').disabled = items.length < 2;
        } else {
            document.getElementById('goBtn').disabled = !hasQ || !getKey();
        }
    }

    // --- Decyzja ---
    async function runDecide() {
        const resInner = document.getElementById('resInner');
        const goBtn = document.getElementById('goBtn');
        const spinner = document.getElementById('spinner');
        const btnLabel = document.getElementById('btnLabel');
        const q = document.getElementById('qInput').value.trim();

        if (mode === 'list') {
            // Losowanie z listy
            document.querySelectorAll('.opt-row').forEach(r => r.classList.remove('winner'));
            resInner.innerHTML = '<div class="label">gotuje...</div>';
            setTimeout(() => {
                const idx = Math.floor(Math.random() * items.length);
                resInner.innerHTML = `
                    <div class="label" style="color:var(--green)">oto twoja decyzja</div>
                    <div style="font-size:22px;font-weight:700">${items[idx]}</div>
                `;
                document.getElementById(`row-${idx}`).classList.add('winner');
            }, 700);

        } else {
            // Groq AI
            goBtn.disabled = true;
            goBtn.classList.add('loading');
            spinner.style.display = 'block';
            btnLabel.textContent = 'Myślę...';
            resInner.innerHTML = '<div class="label">pytam fredka...</div>';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getKey()}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        max_tokens: 300,
                        messages: [
                            {
                                role: 'system',
                                content: `Jesteś maszyną decyzyjną. Zawsze podejmujesz jedną, konkretną decyzję po polsku.
ZASADY których NIGDY nie łamiesz:
- Wybierz JEDNĄ opcję i powiedz co robić. Nigdy dwie, nigdy "to zależy".
- NIE wymieniaj plusów i minusów. NIE porównuj opcji.
- NIE mów "to zależy od ciebie", "sam zdecyduj", "możesz też".
- NIE pytaj o dodatkowe informacje.
- Odpowiedź: max 2 zdania. Pierwsze — decyzja. Drugie — jedno zdanie uzasadnienia (opcjonalne).
- Zacznij od razu od decyzji, np. "Idź na siłownię." lub "Wybierz opcję A."`
                            },
                            {
                                role: 'user',
                                content: q
                            }
                        ]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    resInner.innerHTML = `<div style="color:var(--red);font-size:12px">Błąd: ${data.error.message}</div>`;
                } else {
                    const answer = data.choices[0].message.content;
                    resInner.innerHTML = `
                        <div class="label" style="color:var(--green);margin-bottom:10px">decyzja fredka</div>
                        <div style="text-align:left;font-size:15px;line-height:1.6">${answer}</div>
                    `;
                }
            } catch (e) {
                resInner.innerHTML = `<div style="color:var(--red);font-size:13px">Błąd połączenia. Sprawdź klucz i internet.</div>`;
            } finally {
                goBtn.disabled = false;
                goBtn.classList.remove('loading');
                spinner.style.display = 'none';
                btnLabel.textContent = 'Ugotuj';
                checkBtn();
            }
        }
    }

    // Enter w polu opcji
    document.getElementById('addInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') addItem();
    });
    document.getElementById('qInput').addEventListener('input', checkBtn);

    // Init
    updateKeyBadge();
</script>
</body>
</html>
