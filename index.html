<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Sigmowy Decyzator 3067</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg: #080810;
            --surface: rgba(255,255,255,0.03);
            --surface-hover: rgba(255,255,255,0.06);
            --border: rgba(255,255,255,0.07);
            --border-strong: rgba(255,255,255,0.14);
            --accent: #C8F0FF;
            --accent-dim: rgba(200,240,255,0.5);
            --accent-glow: rgba(200,240,255,0.08);
            --green: #9EFFC0;
            --green-dim: rgba(158,255,192,0.12);
            --red: #FF8080;
            --text: rgba(255,255,255,0.88);
            --text-mid: rgba(255,255,255,0.4);
            --text-low: rgba(255,255,255,0.18);
            --ff: 'DM Sans', sans-serif;
            --fm: 'DM Mono', monospace;
            --radius: 16px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--ff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        /* subtle radial glow at top */
        body::before {
            content: '';
            position: fixed;
            top: -120px;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(200,240,255,0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        .app {
            width: 100%;
            max-width: 420px;
            padding: env(safe-area-inset-top, 2rem) 1.25rem 2.5rem;
            padding-top: max(env(safe-area-inset-top), 2rem);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            min-height: 100dvh;
        }

        /* ── HEADER ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.25rem 0;
        }

        .wordmark {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-low);
        }

        .wordmark em {
            font-style: normal;
            color: var(--accent);
        }

        .key-badge {
            font-family: var(--fm);
            font-size: 10px;
            padding: 6px 12px;
            border-radius: 100px;
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--text-mid);
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: border-color 0.2s, color 0.2s, background 0.2s;
        }
        .key-badge:hover { border-color: var(--accent-dim); color: var(--accent); background: var(--accent-glow); }
        .key-badge.set { border-color: rgba(158,255,192,0.3); color: var(--green); background: var(--green-dim); }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(8,8,16,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 100;
            align-items: flex-end;
            justify-content: center;
            padding: 0 0 env(safe-area-inset-bottom, 0);
        }
        .modal-overlay.visible { display: flex; }

        .modal {
            background: #0e0e1c;
            border: 1px solid var(--border-strong);
            border-bottom: none;
            border-radius: var(--radius) var(--radius) 0 0;
            padding: 2rem 1.5rem calc(2rem + env(safe-area-inset-bottom, 0));
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 36px;
            height: 4px;
            background: var(--border-strong);
            border-radius: 2px;
            margin: 0 auto 0.5rem;
        }

        .modal h3 { font-size: 15px; font-weight: 500; }
        .modal p { font-size: 12px; color: var(--text-mid); line-height: 1.6; }
        .modal a { color: var(--accent); text-decoration: none; }

        /* ── INPUTS ── */
        .field {
            background: var(--surface);
            border: 1px solid var(--border-strong);
            padding: 13px 14px;
            border-radius: var(--radius);
            color: var(--text);
            outline: none;
            width: 100%;
            font-family: var(--ff);
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .field:focus { border-color: rgba(200,240,255,0.25); }
        .field::placeholder { color: var(--text-low); }

        /* ── MODE TOGGLE ── */
        .mode-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 4px;
            gap: 0;
        }

        .mode-btn {
            padding: 10px;
            border-radius: 100px;
            border: none;
            background: transparent;
            color: var(--text-mid);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: var(--ff);
            letter-spacing: 0.04em;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: var(--border-strong);
            color: var(--text);
        }

        /* ── QUESTION INPUT ── */
        .question-wrap {
            position: relative;
        }

        .hero-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border-strong);
            outline: none;
            color: var(--text);
            font-size: 22px;
            font-weight: 300;
            line-height: 1.4;
            padding-bottom: 12px;
            padding-top: 4px;
            resize: none;
            font-family: var(--ff);
            transition: border-color 0.2s;
        }

        .hero-input:focus { border-bottom-color: rgba(200,240,255,0.3); }
        .hero-input::placeholder { color: var(--text-low); }

        /* ── OPTIONS LIST ── */
        .section-label {
            font-family: var(--fm);
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-low);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-label span { color: var(--accent-dim); }

        .opt-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            margin-bottom: 6px;
            animation: fadeSlide 0.2s ease;
            transition: border-color 0.3s, background 0.3s;
        }

        .opt-row.winner {
            border-color: rgba(158,255,192,0.3);
            background: var(--green-dim);
        }

        .opt-row span { font-size: 14px; }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .del-btn {
            background: none;
            border: none;
            color: var(--text-low);
            cursor: pointer;
            font-size: 14px;
            padding: 2px 4px;
            border-radius: 6px;
            transition: color 0.15s;
            line-height: 1;
        }
        .del-btn:hover { color: var(--red); }

        .add-row {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .add-btn {
            width: 46px;
            flex-shrink: 0;
            border-radius: 12px;
            border: 1px solid var(--border-strong);
            background: var(--surface);
            color: var(--accent);
            font-size: 20px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            line-height: 1;
        }
        .add-btn:hover { background: var(--accent-glow); border-color: var(--accent-dim); }

        /* ── CTA BUTTON ── */
        .cta-btn {
            width: 100%;
            padding: 17px;
            border-radius: 100px;
            border: none;
            background: transparent;
            border: 1px solid var(--border-strong);
            color: var(--text);
            font-weight: 500;
            cursor: pointer;
            margin-top: auto;
            font-family: var(--ff);
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: background 0.2s, border-color 0.2s, color 0.2s, opacity 0.2s;
        }

        .cta-btn:not(:disabled):hover {
            background: var(--accent-glow);
            border-color: var(--accent-dim);
            color: var(--accent);
        }

        .cta-btn:disabled { opacity: 0.25; cursor: not-allowed; }

        .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }

        .spinner {
            width: 14px;
            height: 14px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-top-color: var(--text);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── RESULT AREA ── */
        .result-area {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-label {
            font-family: var(--fm);
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-low);
            margin-bottom: 10px;
        }

        .result-label.good { color: rgba(158,255,192,0.6); }

        .result-text {
            font-size: 15px;
            font-weight: 400;
            line-height: 1.65;
            color: var(--text);
        }

        .result-big {
            font-size: 20px;
            font-weight: 500;
            color: var(--text);
        }

        .result-placeholder {
            font-size: 13px;
            color: var(--text-low);
            text-align: center;
        }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: var(--border);
        }
    </style>
</head>
<body>

    <!-- Modal klucza API – bottom sheet -->
    <div class="modal-overlay" id="keyModal" onclick="handleOverlayClick(event)">
        <div class="modal">
            <div class="modal-handle"></div>
            <h3>Klucz API — Groq</h3>
            <p>Darmowy klucz na <a href="https://console.groq.com" target="_blank">console.groq.com</a> → API Keys</p>
            <input type="password" class="field" id="keyInput" placeholder="gsk_...">
            <button class="cta-btn" style="margin-top:0" onclick="saveKey()">Zapisz klucz</button>
            <button onclick="closeModal()" style="background:none;border:none;color:var(--text-low);cursor:pointer;font-size:12px;text-align:center;font-family:var(--ff);padding:4px">Anuluj</button>
        </div>
    </div>

    <div class="app">
        <header class="header">
            <div class="wordmark">decyzator<em>.</em></div>
            <button class="key-badge" id="keyBadge" onclick="openModal()">klucz api</button>
        </header>

        <div class="mode-toggle">
            <button class="mode-btn active" id="modeList" onclick="setMode('list')">opcje</button>
            <button class="mode-btn" id="modeAi" onclick="setMode('ai')">fredek</button>
        </div>

        <textarea class="hero-input" id="qInput" placeholder="co masz za pytanko?" rows="2"></textarea>

        <!-- Ręczne opcje -->
        <div id="listSection">
            <div class="section-label">
                opcje
                <span id="counter">0 / 10</span>
            </div>
            <div id="list"></div>
            <div class="add-row">
                <input type="text" id="addInput" class="field" style="flex:1" placeholder="nowa opcja...">
                <button class="add-btn" onclick="addItem()">+</button>
            </div>
        </div>

        <div class="result-area" id="resCard">
            <div id="resInner">
                <div class="result-placeholder">wynik pojawi się tutaj</div>
            </div>
        </div>

        <button class="cta-btn" id="goBtn" onclick="runDecide()" disabled>
            <div class="btn-inner">
                <div class="spinner" id="spinner"></div>
                <span id="btnLabel">ugotuj</span>
            </div>
        </button>
    </div>

<script>
    let items = [];
    let mode = 'list';
    const STORAGE_KEY = 'groq_api_key';

    function getKey() { return localStorage.getItem(STORAGE_KEY); }

    function saveKey() {
        const val = document.getElementById('keyInput').value.trim();
        if (val) { localStorage.setItem(STORAGE_KEY, val); closeModal(); updateKeyBadge(); }
    }

    function openModal() {
        const k = getKey();
        if (k) document.getElementById('keyInput').value = k;
        document.getElementById('keyModal').classList.add('visible');
    }

    function closeModal() { document.getElementById('keyModal').classList.remove('visible'); }

    function handleOverlayClick(e) {
        if (e.target === document.getElementById('keyModal')) closeModal();
    }

    function updateKeyBadge() {
        const badge = document.getElementById('keyBadge');
        badge.textContent = getKey() ? 'klucz ✓' : 'klucz api';
        badge.classList.toggle('set', !!getKey());
        checkBtn();
    }

    function setMode(m) {
        mode = m;
        document.getElementById('modeList').classList.toggle('active', m === 'list');
        document.getElementById('modeAi').classList.toggle('active', m === 'ai');
        document.getElementById('listSection').style.display = m === 'list' ? 'block' : 'none';
        checkBtn();
    }

    function addItem() {
        const input = document.getElementById('addInput');
        const val = input.value.trim();
        if (val && items.length < 10) {
            items.push(val);
            input.value = '';
            renderList();
        }
    }

    function renderList() {
        document.getElementById('list').innerHTML = items.map((it, i) => `
            <div class="opt-row" id="row-${i}">
                <span>${it}</span>
                <button class="del-btn" onclick="items.splice(${i},1);renderList()">✕</button>
            </div>
        `).join('');
        document.getElementById('counter').textContent = `${items.length} / 10`;
        checkBtn();
    }

    function checkBtn() {
        const hasQ = document.getElementById('qInput').value.trim().length > 2;
        if (mode === 'list') {
            document.getElementById('goBtn').disabled = items.length < 2;
        } else {
            document.getElementById('goBtn').disabled = !hasQ || !getKey();
        }
    }

    async function runDecide() {
        const resInner = document.getElementById('resInner');
        const goBtn = document.getElementById('goBtn');
        const spinner = document.getElementById('spinner');
        const btnLabel = document.getElementById('btnLabel');
        const q = document.getElementById('qInput').value.trim();

        if (mode === 'list') {
            document.querySelectorAll('.opt-row').forEach(r => r.classList.remove('winner'));
            resInner.innerHTML = '<div class="result-placeholder">losuję...</div>';

            setTimeout(() => {
                const idx = Math.floor(Math.random() * items.length);
                resInner.innerHTML = `
                    <div class="result-label good">twoja decyzja</div>
                    <div class="result-big">${items[idx]}</div>
                `;
                document.getElementById(`row-${idx}`).classList.add('winner');
            }, 650);

        } else {
            goBtn.disabled = true;
            goBtn.classList.add('loading');
            spinner.style.display = 'block';
            btnLabel.textContent = 'myślę...';
            resInner.innerHTML = '<div class="result-placeholder">pytam fredka...</div>';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getKey()}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        max_tokens: 300,
                        messages: [
                            {
                                role: 'system',
                                content: `Jesteś maszyną decyzyjną. Zawsze podejmujesz jedną, konkretną decyzję po polsku.
ZASADY których NIGDY nie łamiesz:
- Wybierz JEDNĄ opcję i powiedz co robić. Nigdy dwie, nigdy "to zależy".
- NIE wymieniaj plusów i minusów. NIE porównuj opcji.
- NIE mów "to zależy od ciebie", "sam zdecyduj", "możesz też".
- NIE pytaj o dodatkowe informacje.
- Odpowiedź: max 2 zdania. Pierwsze — decyzja. Drugie — jedno zdanie uzasadnienia (opcjonalne).
- Zacznij od razu od decyzji, np. "Idź na siłownię." lub "Wybierz opcję A."`
                            },
                            { role: 'user', content: q }
                        ]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    resInner.innerHTML = `<div style="color:var(--red);font-size:13px">Błąd: ${data.error.message}</div>`;
                } else {
                    const answer = data.choices[0].message.content;
                    resInner.innerHTML = `
                        <div class="result-label good">decyzja fredka</div>
                        <div class="result-text">${answer}</div>
                    `;
                }
            } catch (e) {
                resInner.innerHTML = `<div style="color:var(--red);font-size:13px">Błąd połączenia. Sprawdź klucz i internet.</div>`;
            } finally {
                goBtn.disabled = false;
                goBtn.classList.remove('loading');
                spinner.style.display = 'none';
                btnLabel.textContent = 'ugotuj';
                checkBtn();
            }
        }
    }

    document.getElementById('addInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') addItem();
    });
    document.getElementById('qInput').addEventListener('input', checkBtn);

    updateKeyBadge();
</script>
</body>
</html>
